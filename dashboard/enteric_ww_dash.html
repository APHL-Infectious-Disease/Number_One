<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<style>body{background-color:white;}</style>
<script src="lib/jquery-3.6.0/jquery.min.js"></script>
<script src="lib/ionrangeslider-javascript-2.3.1/js/ion.rangeSlider.min.js"></script>
<script src="lib/strftime-0.9.2/strftime-min.js"></script>
<link href="lib/ionrangeslider-css-2.3.1/css/ion.rangeSlider.css" rel="stylesheet" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="lib/bootstrap-3.4.1/css/bootstrap.min.css" rel="stylesheet" />
<link href="lib/bootstrap-3.4.1/accessibility/css/bootstrap-accessibility.min.css" rel="stylesheet" />
<script src="lib/bootstrap-3.4.1/js/bootstrap.min.js"></script>
<script src="lib/bootstrap-3.4.1/accessibility/js/bootstrap-accessibility.min.js"></script>
  <title>Old Faithful Geyser Data</title>
</head>
<body>
<div class="container-fluid">
  <h2>Old Faithful Geyser Data</h2>
  <div class="row">
    <div class="col-sm-4">
      <form class="well" role="complementary">
        <div class="form-group shiny-input-container">
          <label class="control-label" id="bins-label" for="bins">Number of bins:</label>
          <input class="js-range-slider" id="bins" data-skin="shiny" data-min="1" data-max="50" data-from="30" data-step="1" data-grid="true" data-grid-num="9.8" data-grid-snap="false" data-prettify-separator="," data-prettify-enabled="true" data-keyboard="true" data-data-type="number"/>
        </div>
      </form>
    </div>
    <div class="col-sm-8" role="main">
      <div class="shiny-plot-output html-fill-item" id="distPlot" style="width:100%;height:400px;"></div>
    </div>
  </div>
</div>
</body>
</html>
